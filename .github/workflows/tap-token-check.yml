name: tap-token-check

# Verifies HOMEBREW_TAP_TOKEN can still push to duggan/homebrew-usagi, without
# cutting a release. Run this before tagging — the token is a fine-grained PAT
# and expires silently, which strands the tap on the previous version while the
# GitHub Release publishes just fine.
#
#   gh workflow run tap-token-check --repo duggan/usagi

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Check tap token
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN is not set on the 'release' environment."
            exit 1
          fi

          code=$(curl -sS -o /tmp/tap.json -w '%{http_code}' \
            -H "Authorization: Bearer ${TAP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/duggan/homebrew-usagi)
          if [ "$code" != "200" ]; then
            echo "::error::Token rejected by the GitHub API (HTTP $code) — expired or revoked."
            exit 1
          fi

          push=$(jq -r '.permissions.push // false' /tmp/tap.json)
          echo "repo:  $(jq -r .full_name /tmp/tap.json)"
          echo "push:  $push"
          if [ "$push" != "true" ]; then
            echo "::error::Token authenticates but lacks write access. Needs fine-grained 'Contents: write' on duggan/homebrew-usagi."
            exit 1
          fi

          # The API permission bit is necessary but not sufficient — prove the
          # credential actually works over git by pushing to a scratch ref, then
          # deleting it. Touches no branch and leaves no history behind.
          REF="refs/heads/ci/tap-token-check-${GITHUB_RUN_ID}"
          REMOTE="https://x-access-token:${TAP_TOKEN}@github.com/duggan/homebrew-usagi.git"
          git clone --depth 1 --quiet "$REMOTE" tap
          cd tap
          git push --quiet origin "HEAD:${REF}"
          git push --quiet origin --delete "${REF}"
          echo "Tap token OK — API write permission and a real git push both succeeded."
